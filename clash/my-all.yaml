# =====================================
#    OpenClash Meta 分流配置
#
#    针对个人优化 优化国内服务
#
# 仅适配个人使用 不通用 请自行把握
# =====================================

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
geodata-mode: true
geodata-loader: memconservative
etag-support: true

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.wechat.com"
    - "+.qq.com"
    - "+.tencent.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.xboxlive.com"
    - "localhost.ptlogin2.qq.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  mtu: 9000
  gso: true
  gso-max-size: 65536
  udp-timeout: 300

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - "time-ios.apple.com"
    - "*.ntp.org.cn"
    - "*.pool.ntp.org"
    - "*.qq.com"
    - "*.tencent.com"
    - "*.wechat.com"
    - "*.weixin.com"
    - "*.qpic.cn"
    - "*.tenpay.com"
    - "*.alipay.com"
    - "*.bilivideo.com"
    - "*.bilibili.com"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - "*.xboxlive.com"
    - "localhost.ptlogin2.qq.com"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 180.76.76.76

  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://120.53.53.53/dns-query
    - https://1.12.12.12/dns-query

  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://120.53.53.53/dns-query
    - https://doh.pub/dns-query
    - tls://dot.pub

  nameserver:
    - https://223.5.5.5/dns-query
    - https://120.53.53.53/dns-query
    - https://doh.pub/dns-query
    - tls://dot.pub

  nameserver-policy:
    "rule-set:Private,China,Direct,Apple_CN,WeChat,QQ,Bilibili,BilibiliHMT,ChinaMedia":
      - https://223.5.5.5/dns-query
      - https://120.53.53.53/dns-query
      - https://doh.pub/dns-query
      - tls://dot.pub
    "geosite:cn":
      - https://223.5.5.5/dns-query
      - https://120.53.53.53/dns-query
      - https://doh.pub/dns-query
    "geosite:private":
      - https://223.5.5.5/dns-query
      - https://120.53.53.53/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - https://8.8.8.8/dns-query
    - https://8.8.4.4/dns-query
    - tls://1.1.1.1
    - tls://8.8.8.8

proxy-providers:

  机场名: # 需要修改
    url: "订阅地址" # 需要修改
    type: http
    interval: 86400
    path: ./proxy_provider/机场名.yaml # 需要修改
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连


proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

default: &default
  type: select
  proxies:
    - 直连
    - 所有-自动
    - 所有-手动
    - 香港-自动
    - 香港-故转
    - 香港-手动
    - 台湾-自动
    - 台湾-故转
    - 台湾-手动
    - 日本-自动
    - 日本-故转
    - 日本-手动
    - 韩国-自动
    - 韩国-故转
    - 韩国-手动
    - 新加坡-自动
    - 新加坡-故转
    - 新加坡-手动
    - 美国-自动
    - 美国-故转
    - 美国-手动
    - 家宽-自动
    - 家宽-故转
    - 家宽-手动
    - 其他-自动
    - 其他-故转
    - 其他-手动
    - 拒绝

domestic_default: &domestic_default
  type: select
  proxies:
    - 直连
    - 香港-自动
    - 香港-故转
    - 香港-手动
    - 家宽-自动
    - 家宽-故转
    - 家宽-手动
    - 所有-自动
    - 所有-手动
    - 拒绝

proxy-groups:
  - {name: 自定义代理, <<: *default}
  - {name: 自定义直连, <<: *domestic_default}
  - {name: Dev, <<: *default}
  
  - {name: YouTube, <<: *default}
  - {name: TikTok, <<: *default}
  - {name: Facebook, <<: *default}
  - {name: Telegram, <<: *default}
  - {name: Twitter(X), <<: *default}
  - {name: Instagram, <<: *default}

  - {name: AI, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Google, <<: *default}
  - {name: T-mobile, <<: *default}
  - {name: Reddit, <<: *default}
  - {name: Apple-国内, <<: *domestic_default}
  - {name: Apple-国际, <<: *default}
  - {name: Games, <<: *default}
  - {name: Crypto, <<: *default}

  - {name: 微信, <<: *domestic_default}
  - {name: QQ, <<: *domestic_default}
  - {name: 哔哩哔哩, <<: *domestic_default}
  - {name: 国内流媒体, <<: *domestic_default}
  - {name: 海外流媒体, <<: *default}
  - {name: Download, <<: *domestic_default}
  - {name: Test, <<: *domestic_default}

  - name: Block
    type: select
    proxies: [拒绝, 直连]

  - {name: 国外, <<: *default}
  - {name: 国内, <<: *domestic_default}
  - {name: 其他, <<: *domestic_default}

  - name: 所有-手动
    type: select
    include-all: true
    filter: "^(?!(直连|拒绝)$)(?!((地址|官网|流量|剩余流量|流量重置|剩余|到期|过期|套餐|订阅|公告|重置|客服|TG群|频道|邮箱|网址|更新)([:：\\s\\-_|]|$))).*$"

  - name: 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 180
    lazy: true
    url: https://www.gstatic.com/generate_204
    filter: "^(?!(直连|拒绝)$)(?!((地址|官网|流量|剩余流量|流量重置|剩余|到期|过期|套餐|订阅|公告|重置|客服|TG群|频道|邮箱|网址|更新)([:：\\s\\-_|]|$))).*$"

